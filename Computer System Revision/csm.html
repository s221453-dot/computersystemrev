<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSE ICT Dynamic Exam System</title>
    <style>
        body { font-family: "Times New Roman", serif; background: #515a5a; padding: 20px; display: flex; justify-content: center; }
        .paper { background: white; width: 850px; padding: 50px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 4px; }
        .header { border: 2px solid #000; text-align: center; padding: 10px; margin-bottom: 20px; }
        .section-title { background: #eee; padding: 5px; font-weight: bold; margin: 20px 0; border: 1px solid #000; }
        .q-block { margin-bottom: 25px; }
        .options { list-style: none; padding-left: 20px; }
        .long-q-area { border: 1px solid #ccc; height: 60px; margin: 10px 0; background: #fafafa; }
        .btn-container { text-align: center; margin-top: 30px; border-top: 2px solid #000; padding-top: 20px; }
        button { padding: 12px 30px; cursor: pointer; font-weight: bold; background: #2c3e50; color: white; border: none; }
        #results { display: none; background: #e8f8f5; border: 2px solid #27ae60; padding: 20px; margin-top: 20px; }
        .grade-stamp { font-size: 3rem; color: #c0392b; font-weight: bold; border: 4px solid #c0392b; display: inline-block; padding: 10px; transform: rotate(-5deg); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="paper">
    <div class="header">
        <h2>HKDSE ICT MOCK EXAMINATION</h2>
        <p>PAPER 1 (COMPULSORY PART) - COMPUTER SYSTEMS</p>
    </div>

    <div id="exam-content">
        <div class="section-title">SECTION A: Multiple Choice (10 Questions)</div>
        <div id="mc-container"></div>

        <div class="section-title">SECTION B: Structured Long Questions (3 Questions)</div>
        <div id="long-container"></div>
    </div>

    <div class="btn-container">
        <button id="submit-btn" onclick="gradePaper()">SUBMIT AND PREDICT GRADE</button>
        <button onclick="location.reload()" style="background:#7f8c8d">GENERATE NEW PAPER</button>
    </div>

    <div id="results">
        <h2>OFFICIAL TRANSCRIPT</h2>
        <div class="grade-stamp" id="grade">--</div>
        <div id="score-details" style="margin-top:20px"></div>
        <div id="answers-key" style="margin-top:20px; font-size: 0.9rem; color: #555;"></div>
    </div>
</div>

<script>
// EXTENDED QUESTION BANK
const mcBank = [
    {q: "Which register is responsible for holding the address of the current memory location being accessed?", a: ["PC", "MAR", "MDR", "ALU"], c: 1},
    {q: "What is the primary reason for using a 3D printer in a medical lab?", a: ["High speed printing", "Low material cost", "Creating custom prosthetics", "Replacing 2D inkjet"], c: 2},
    {q: "Which part of the CPU is considered the 'Brain' that coordinates signals?", a: ["ALU", "Control Unit", "Cache", "Bus"], c: 1},
    {q: "A computer uses 'Virtual Memory' when...", a: ["The CPU is too hot", "The RAM is full", "The SSD is disconnected", "Internet is slow"], c: 1},
    {q: "Which port is used specifically for high-speed digital displays and usually supports Daisy-Chaining?", a: ["VGA", "HDMI", "DisplayPort", "USB 2.0"], c: 2},
    {q: "The process of combining multiple physical servers into one through software is:", a: ["Batching", "Parallelism", "Virtualization", "Distribution"], c: 2},
    {q: "Which memory type is used to reduce the speed gap between CPU and RAM?", a: ["ROM", "Secondary Storage", "Cache", "Virtual Memory"], c: 2},
    {q: "A point-of-sale (POS) system uses which input for rapid data entry?", a: ["Keyboard", "OCR", "Barcode Scanner", "Mic"], c: 2},
    {q: "Which processing is used when thousands of payroll records are handled at once?", a: ["Real-time", "Batch", "Interactive", "Online"], c: 1},
    {q: "What is the result of increasing the 'Clock Speed'?", a: ["More storage space", "More instructions per second", "Better internet", "Higher resolution"], c: 1},
    {q: "Which printer is 'Impact' based?", a: ["Laser", "Inkjet", "Dot-Matrix", "Thermal"], c: 2},
    {q: "Which is non-volatile?", a: ["SRAM", "DRAM", "EEPROM", "L1 Cache"], c: 2}
];

const longBank = [
    {s: "Scenario: A smart greenhouse uses sensors to monitor temperature.", p: [
        {q: "i) Name the type of device required to convert the digital signal from the computer to a physical action (e.g. opening a window).", a: "Actuator"},
        {q: "ii) Explain why real-time processing is necessary here.", a: "To prevent plants from dying if temperature spikes suddenly."}
    ]},
    {s: "Scenario: A user is upgrading an old PC's HDD to an SSD.", p: [
        {q: "i) State two advantages of SSD over HDD.", a: "Higher speed and better durability (no moving parts)."},
        {q: "ii) Will defragmenting this new SSD help? Explain.", a: "No, SSDs use flash memory and defragging can actually reduce their lifespan."}
    ]},
    {s: "Scenario: A company uses a 'Distributed Processing' system for data mining.", p: [
        {q: "i) Define Distributed Processing.", a: "Tasks are spread across multiple computers connected via a network."},
        {q: "ii) State one disadvantage of this system.", a: "Complex security and network dependence."}
    ]},
    {s: "Scenario: A graphic designer uses a monitor with high color depth.", p: [
        {q: "i) Define 'Color Depth'.", a: "The number of bits used to represent the color of a single pixel."},
        {q: "ii) Suggest an input device suitable for professional drawing.", a: "Graphic Tablet / Stylus."}
    ]}
];

// GENERATION LOGIC
function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

const selectedMC = shuffle([...mcBank]).slice(0, 10);
const selectedLong = shuffle([...longBank]).slice(0, 3);

const mcCont = document.getElementById('mc-container');
selectedMC.forEach((item, i) => {
    mcCont.innerHTML += `
        <div class="q-block">
            <b>${i+1}.</b> ${item.q}<br>
            <ul class="options">
                ${item.a.map((opt, idx) => `<li><input type="radio" name="mc${i}" value="${idx}"> ${opt}</li>`).join('')}
            </ul>
        </div>
    `;
});

const longCont = document.getElementById('long-container');
selectedLong.forEach((item, i) => {
    longCont.innerHTML += `
        <div class="q-block">
            <b>Q${i+1} [Structured]</b><br><i>${item.s}</i><br>
            ${item.p.map((part, pi) => `
                <p>${part.q}</p>
                <textarea style="width:100%; height:50px;"></textarea>
            `).join('')}
        </div>
    `;
});

function gradePaper() {
    let mcScore = 0;
    let keyHTML = "<h3>Answer Key:</h3>";
    
    selectedMC.forEach((item, i) => {
        const sel = document.querySelector(`input[name="mc${i}"]:checked`);
        if(sel && parseInt(sel.value) === item.c) mcScore++;
        keyHTML += `MC${i+1}: ${item.a[item.c]} | `;
    });

    // Simulated Long Question Grading (User self-assessment)
    const longScore = confirm("DSE ICT Tip: Long questions are graded by markers. For this simulation, did you answer the structured questions accurately based on your notes?") ? 10 : 4;
    
    const totalRaw = mcScore + longScore;
    const percent = (totalRaw / 20) * 100;
    
    let g = "U";
    if(percent >= 90) g="5**";
    else if(percent >= 80) g="5*";
    else if(percent >= 70) g="5";
    else if(percent >= 60) g="4";
    else if(percent >= 50) g="3";
    else if(percent >= 40) g="2";

    document.getElementById('grade').innerText = g;
    document.getElementById('score-details').innerHTML = `MC: ${mcScore}/10 | Structured: ${longScore}/10<br>Weighted Score: ${percent}%`;
    document.getElementById('answers-key').innerHTML = keyHTML;
    document.getElementById('results').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}
</script>

</body>
</html>
